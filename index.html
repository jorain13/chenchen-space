<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>辰辰宇宙历险记</title>
<style>
*{margin:0;padding:0;border:0;box-sizing:border-box}
html,body{width:100%;height:100%;position:fixed;top:0;left:0;overflow:hidden;background:#000}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#ui{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:8px 12px;display:flex;justify-content:space-between;padding-top:max(8px,env(safe-area-inset-top,0))}
#ui span{background:rgba(0,0,0,0.7);color:#fff;font-size:13px;font-weight:bold;padding:5px 12px;border-radius:12px}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;display:flex;align-items:center;just-content:center;background:rgba(0,0,0,0.7);pointer-events:auto}
.box{background:rgba(10,10,40,0.95);border:2px solid rgba(100,200,255,0.4);border-radius:24px;padding:30px;text-align:center;color:#fff;max-width:340px;width:85%;margin:auto}
.box h1{font-size:32px;color:#fd4;margin-bottom:8px}
.box p{font-size:14px;color:#9ab;line-height:1.7;margin-bottom:22px}
#startBtn{display:inline-block;padding:18px 56px;font-size:22px;font-weight:bold;border:none;border-radius:30px;background:linear-gradient(135deg,#f62,#e30);color:#fff;cursor:pointer;pointer-events:auto;touch-action:manipulation;-webkit-tap-highlight-color:transparent;position:relative;z-index:9999}
#startBtn:active{transform:scale(0.94);background:#f00}
#armBtn{position:fixed;bottom:170px;right:14px;z-index:20;width:64px;height:64px;border-radius:50%;background:rgba(255,140,0,0.65);border:3px solid rgba(255,200,100,0.8);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;pointer-events:auto;touch-action:manipulation;-webkit-tap-highlight-color:transparent;box-shadow:0 0 18px rgba(255,140,0,0.5)}
#armBtn:active{background:rgba(255,180,60,0.9);border-color:#fff;transform:scale(0.9)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"><span id="hp">❤️100</span><span id="info">🌌第1关</span><span id="ammo">🔫100</span></div>
<div id="overlay">
  <div class="box">
    <h1>🚀 辰辰宇宙历险记</h1>
    <p>🕹️左下角摇杆控制方向<br>🔫右手按住射击·自动瞄准<br>🌍靠近地球回血<br>💀撞到外星人/陨石=结束</p>
    <button id="startBtn">🎮 出发！</button>
  </div>
</div>
<button id="armBtn">🤖</button>

<script>
// ============================================================
//  🎮 辰辰的宇宙历险记 — 游戏规则配置
//  修改游戏规则只需改这个区块的数值！
// ============================================================

var CFG = {
  // ── 世界 ──
  WORLD_W: 800,
  WORLD_H: 449,

  // ── 玩家 ──
  PLAYER_HP: 100,
  PLAYER_AMMO: 100,
  PLAYER_SPEED: 3.5,
  PLAYER_INVINCIBLE_MS: 600,
  PLAYER_DMG: 3,              // damage per bullet

  // ── 射击（长按减速 + 能量弹连发）──
  BULLET_SPEED_MAX: 14,       // 初始子弹速度
  BULLET_SPEED_MIN: 4,        // 长按最低子弹速度
  BULLET_SPEED_DECAY: 0.8,    // 每次射击减速量
  BULLET_SPEED_RECOVER: 0.15, // 停火每帧恢复量
  FIRE_RATE: 200,             // 正常射击间隔 ms
  RAPID_FIRE_RATE: 40,        // 能量弹连发间隔 ms
  RAPID_FIRE_DURATION: 3000,  // 能量弹连发持续 ms

  // ── 闪电加速 ──
  BOOST_SPEED: 6,             // 闪电加速后的速度
  BOOST_DURATION: 5000,       // 闪电持续 ms

  // ── 红色外星人 ──
  RED_BULLET_DMG: 10,         // 1/10 of max HP
  RED_BULLET_SPEED: 3.5,
  RED_BASE_COUNT: 5,          // level 1 count
  RED_AGGRO_RANGE: 180,       // 进入此范围后转为追击模式

  // ── 宇宙垃圾 ──
  JUNK_BASE_COUNT: 3,         // level 1 count
  JUNK_COUNT_SCALE: 1,        // +1 per level

  // ── 地球回血 ──
  HEAL_RATE: 20,              // HP per second

  // ── 小星星（等级1/2/4，无等级3）──
  STAR_SCORES: [50, 100, 500],            // 等级1/2/4 分值
  STAR_SPEEDS: [0.3, 0.5, 1.0],          // 等级1/2/4 基础速度
  STAR_SPAWN_MIN: 1000,                   // 刷新间隔 ms
  STAR_SPAWN_MAX: 3000,
  STAR_RATIO: [0.50, 0.35, 0.15],        // 比例
  STAR_BASE: 5,                           // 第1关总数
  STAR_SCALE: 2,                          // 每关+2
  COUNTDOWN_SEC: 10,                      // 通关倒计时

  // ── 机械臂 ──
  ARM_MAX_LEN: 100,                   // 最大伸出 = 火箭高度
  ARM_SPEED: 4,                       // 伸缩速度
  ARM_CLAW_SIZE: 10,                  // 抓夹大小
  ARM_SLOW: [0.7, 0.5, 0.3]          // 抓石后速度倍率 等级1/2/3
};

// ============================================================
//  🧮 数学工具
// ============================================================
var M = Math;

function dist(a, b) {
  return M.hypot(a.x - b.x, a.y - b.y);
}

function angleTo(a, b) {
  return M.atan2(b.y - a.y, b.x - a.x);
}

function rand(min, max) {
  return min + M.random() * (max - min);
}

function clamp(v, lo, hi) {
  return M.max(lo, M.min(hi, v));
}

/** 世界边缘随机位置 + 朝屏幕内的角度 */
function spawnAtEdge() {
  var m = 50, s = M.floor(M.random() * 4), x, y;
  if (s === 0)      { x = rand(m, CFG.WORLD_W - m); y = -m; }
  else if (s === 1) { x = rand(m, CFG.WORLD_W - m); y = CFG.WORLD_H + m; }
  else if (s === 2) { x = -m; y = rand(m, CFG.WORLD_H - m); }
  else              { x = CFG.WORLD_W + m; y = rand(m, CFG.WORLD_H - m); }
  var cx = CFG.WORLD_W / 2, cy = CFG.WORLD_H / 2;
  return { x: x, y: y, inAngle: M.atan2(cy - y, cx - x) };
}

function nearEarth(pos) {
  return dist(pos, EARTH) < EARTH.r * 1.8;
}

/** 粒子特效 */
function spawnParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var a = M.random() * M.PI * 2;
    particles.push({
      x: x, y: y,
      vx: M.cos(a) * rand(1, 5),
      vy: M.sin(a) * rand(1, 5),
      life: 1,
      decay: rand(0.02, 0.06),
      color: color,
      size: rand(1.5, 5)
    });
  }
}

// ============================================================
//  📦 游戏状态
// ============================================================
var canvas, ctx;
var screenW, screenH;
var images = {};

var player = null;
var redAliens   = [];
var greenAliens = [];
var spaceJunk   = [];
var bullets     = [];
var enemyBullets = [];
var pickups     = [];
var stars      = [];   // 小星星
var bombs      = [];   // 炸弹（碰到即死）
var floatingTxt  = [];
var particles   = [];

var camera  = { x: 0, y: 0 };
var lastFrame = 0;
var lastShot  = 0;
var state     = 'title';   // 'title' | 'play' | 'over' | 'countdown'
var princePhase = 0;       // 小王子动画阶段
var princeTimer = 0;       // 动画计时器
var countdownStart = 0;    // 倒计时开始时间
var plantedFlowers = [];   // 永久种植的小花
var princessActive = false; // 公主是否已出场
var redCount = 5;          // 当前关卡红外星人目标数
var armHint = true;        // 抓取提示
var boostHint = true;      // 闪电提示
var ammoHint = true;       // 能量包提示
var hintPause = false;     // 暂停教学
var hintMsg = '';          // 教学文字
var hintTimer = 0;         // 提示自动消失计时
var armBtnBlock = false;   // 防止抓夹触发子弹
var level     = 1;
var score     = 0;
var mouseShoot = false;
var armState    = 'idle';    // 'idle' | 'extending' | 'retracting'
var armLength   = 0;
var armAngle    = 0;
var armGrabbed  = null;      // 抓到的星星对象
var armSlow     = 1;         // 当前速度倍率

var joystick = { cx: 130, cy: 300, r: 90, active: false, dx: 0, dy: 0 };
var gameTime = 0;
var shakeAmt = 0;

var nextPickupTimer = 0;
var ammoSpawned = 0;       // 本关已生成能量包数
var boostSpawned = 0;      // 本关已生成闪电数
var nextStoneTimer  = 0;

// ── 地球 & 行星（固定位置）──
var EARTH = { x: CFG.WORLD_W * 0.32, y: CFG.WORLD_H * 0.72, r: 38 };
var PLANETS = [
  { x: CFG.WORLD_W * 0.16, y: CFG.WORLD_H * 0.26, r: 24 },
  { x: CFG.WORLD_W * 0.84, y: CFG.WORLD_H * 0.37, r: 28 },
  { x: CFG.WORLD_W * 0.32, y: CFG.WORLD_H * 0.72, r: 20 },
  { x: CFG.WORLD_W * 0.82, y: CFG.WORLD_H * 0.82, r: 28 },
  { x: CFG.WORLD_W * 0.5,  y: CFG.WORLD_H * 0.18, r: 18 },
  { x: CFG.WORLD_W * 0.62, y: CFG.WORLD_H * 0.55, r: 17 }
];

// ============================================================
//  🏭 实体生成
// ============================================================

/** 按关卡计算难度参数 */
function levelConfig(lv) {
  return {
    redMax:    redCount,
    redSpeed:  0.5 + lv * 0.2,
    redHP:     lv <= 3 ? 9 : lv <= 6 ? 12 : lv <= 10 ? 15 : 21,
    redCD:     M.max(600, 1800 - lv * 100),
    junkMax:   CFG.JUNK_BASE_COUNT + (lv - 1) * CFG.JUNK_COUNT_SCALE
  };
}

function spawnRedAlien(cfg) {
  var edge = spawnAtEdge();
  return {
    pos: { x: edge.x, y: edge.y },
    hp: cfg.redHP, maxHp: cfg.redHP,
    lastShot: Date.now() + rand(1500, 3000),
    cooldown: cfg.redCD + rand(-200, 300),
    speed: cfg.redSpeed,
    hunting: false,                    // 是否追击模式
    wanderAngle: edge.inAngle,         // 游走方向
    wanderTimer: Date.now() + rand(1000, 3000)
  };
}

function spawnGreenAlien(cfg) {
  var edge = spawnAtEdge();
  return {
    pos: { x: edge.x, y: edge.y },
    wanderAngle: edge.inAngle,
    wanderTimer: Date.now() + rand(1000, 3500),
    energyAmt: M.random() < 0.5 ? 20 : 50,
    speed: cfg.redSpeed * 0.8
  };
}

function spawnSpaceJunk(junkSpeed) {
  var edge = spawnAtEdge();
  return {
    pos: { x: edge.x, y: edge.y },
    radius: rand(10, 20),
    rotation: rand(0, M.PI * 2),
    rotSpeed: rand(-0.02, 0.02),
    driftAngle: edge.inAngle,
    driftSpeed: rand(junkSpeed * 0.5, junkSpeed)
  };
}

function spawnStar() {
  var roll = M.random(), tier = 0, acc = 0;
  for (var t = 0; t < 3; t++) { acc += CFG.STAR_RATIO[t]; if (roll < acc) { tier = t; break; } }
  var spd = CFG.STAR_SPEEDS[tier] * rand(0.7, 1.3);
  // 从屏幕边缘刷新
  var s = M.floor(M.random() * 4), x, y, dx, dy;
  var m = 30;
  if (s === 0)      { x = rand(m, CFG.WORLD_W - m); y = -m; dx = rand(-spd, spd); dy = spd; }
  else if (s === 1) { x = rand(m, CFG.WORLD_W - m); y = CFG.WORLD_H + m; dx = rand(-spd, spd); dy = -spd; }
  else if (s === 2) { x = -m; y = rand(m, CFG.WORLD_H - m); dx = spd; dy = rand(-spd, spd); }
  else              { x = CFG.WORLD_W + m; y = rand(m, CFG.WORLD_H - m); dx = -spd; dy = rand(-spd, spd); }
  stars.push({
    pos: { x: x, y: y },
    vx: dx, vy: dy,
    baseVX: dx, baseVY: dy,  // 基础速度
    tier: tier,
    life: 1200,
    phase: rand(0, M.PI * 2) // 波浪/漂浮相位
  });
}

// ============================================================
//  🎯 关卡管理
// ============================================================

function initLevel(lv) {
  var cfg = levelConfig(lv);
  var i;

  // 红色外星人
  redAliens = [];
  for (i = 0; i < cfg.redMax; i++) {
    redAliens.push(spawnRedAlien(cfg));
  }

  // 绿色外星人
  var greenCount = M.max(1, M.floor(lv / 3));
  greenAliens = [];
  for (i = 0; i < greenCount; i++) {
    greenAliens.push(spawnGreenAlien(cfg));
  }

  // 宇宙垃圾
  var junkSpeed = 0.1 + lv * 0.06;
  spaceJunk = [];
  for (i = 0; i < cfg.junkMax; i++) {
    spaceJunk.push(spawnSpaceJunk(junkSpeed));
  }

  // 清空其他
  bullets = [];
  enemyBullets = [];
  pickups = [];
  stars = [];
  floatingTxt = [];
  particles = [];
  // 炸弹：每关1-5个
  bombs = [];
  var bombN = 1 + M.floor(M.random() * 5);
  for (i = 0; i < bombN; i++) {
    bombs.push({ pos: { x: rand(60, CFG.WORLD_W - 60), y: rand(60, CFG.WORLD_H - 60) }, life: 1800, phase: rand(0, M.PI*2) });
  }

  // 每关能量包+闪电配额：第1关各3个，之后每关各+1
  ammoSpawned = 0;
  boostSpawned = 0;
  nextPickupTimer = Date.now() + rand(2000, 4000);
  // 星星刷新
  nextStoneTimer  = Date.now() + rand(CFG.STAR_SPAWN_MIN, CFG.STAR_SPAWN_MAX);

  updateHUD();
}

// ============================================================
//  🎬 游戏流程
// ============================================================

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('armBtn').style.display = 'flex';

  player = {
    x: CFG.WORLD_W * 0.5, y: CFG.WORLD_H * 0.55,
    hp:   CFG.PLAYER_HP,
    ammo: CFG.PLAYER_AMMO,
    heading: -M.PI / 2,
    speed: CFG.PLAYER_SPEED,
    invUntil: Date.now() + 2000,
    boostUntil: 0,
    bulletSpeed: CFG.BULLET_SPEED_MAX,
    rapidFireUntil: 0
  };

  lastShot = 0;
  score = 0;
  level = 1;
  redCount = CFG.RED_BASE_COUNT;
  state = 'play';
  plantedFlowers = [];
  countdownStart = 0;
  gameTime = 0;
  shakeAmt = 0;
  ammoSpawned = 0; boostSpawned = 0;
  armState = 'idle'; armLength = 0; armGrabbed = null; armSlow = 1;
  armHint = true; boostHint = true; ammoHint = true; hintPause = false; hintMsg = '';
  princessActive = false;

  initLevel(1);
}

function gameOver(reason) {
  state = 'over';
  document.getElementById('armBtn').style.display = 'none';
  var overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';
  overlay.innerHTML = '<div class="box"><h1>💀 挑战失败</h1><p>' + reason +
    '<br>第' + level + '关 · 得分' + score +
    '</p><button id="startBtn">🔄 重新开始</button></div>';
  var btn = document.getElementById('startBtn');
  btn.addEventListener('click', function(e) { e.preventDefault(); startGame(); });
  btn.addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });
}

function levelWin() {
  state = 'countdown';
  princePhase = 0;
  princeTimer = Date.now();
  countdownStart = Date.now();
}

function deployArm() {
  if (armState !== 'idle' || !player) return;
  armHint = false; boostHint = false; ammoHint = false; hintPause = false; hintMsg = '';
  armState = 'extending';
  armLength = 0;
  armAngle = player.heading;
  armGrabbed = null;
  armSlow = 1;
}

function updateArm(dt) {
  if (armState === 'idle') return;
  var spd = CFG.ARM_SPEED * (dt / 16);

  if (armState === 'extending') {
    // 机械臂始终沿火箭轴线方向
    armAngle = player.heading;
    armLength += spd * 2;
    if (armLength >= CFG.ARM_MAX_LEN) {
      armLength = CFG.ARM_MAX_LEN;
      armState = 'retracting';
    }
    // 检测碰到星星（从火箭顶端算起）
    var tipX = player.x + M.cos(armAngle) * (armLength + 50);
    var tipY = player.y + M.sin(armAngle) * (armLength + 50);
    for (var i = stars.length - 1; i >= 0; i--) {
      if (dist({ x: tipX, y: tipY }, stars[i].pos) < 26) {
        armGrabbed = stars[i];
        armSlow = CFG.ARM_SLOW[M.min(armGrabbed.tier, 2)]; // clamp to 0-2
        armState = 'retracting';
        break;
      }
    }
  } else if (armState === 'retracting') {
    armAngle = player.heading;
    var retractSpd = armGrabbed ? spd * (1 - armGrabbed.tier * 0.25) : spd * 3;
    armLength = M.max(0, armLength - retractSpd);
    if (armLength <= 2) {
      if (armGrabbed !== null) {
        var idx = stars.indexOf(armGrabbed);
        if (idx >= 0) {
          var pts = CFG.STAR_SCORES[armGrabbed.tier];
          score += pts;
          floatingTxt.push({ x: armGrabbed.pos.x, y: armGrabbed.pos.y, text: '+' + pts, life: 60, vy: -2 });
          spawnParticles(armGrabbed.pos.x, armGrabbed.pos.y, '#ff0', 8);
          stars.splice(idx, 1);
          updateHUD();
        }
      }
      armLength = 0;
      armState = 'idle';
      armGrabbed = null;
      armSlow = 1;
    }
  }
}

function updateHUD() {
  if (state === 'countdown') {
    var remain = M.max(0, M.ceil((CFG.COUNTDOWN_SEC * 1000 - (Date.now() - countdownStart)) / 1000));
    document.getElementById('info').textContent = '🌸 通关 ' + remain + 's';
    return;
  }
  if (!player) return;
  document.getElementById('hp').textContent   = '❤️' + M.max(0, M.round(player.hp));
  document.getElementById('ammo').textContent = '🔫' + player.ammo;
  document.getElementById('info').textContent = '🌌第' + level + '关 👾' + redAliens.length + ' 💎' + score;
}

// ============================================================
//  🔫 射击
// ============================================================

function playerFire(now, force) {
  if (!player || player.ammo <= 0 || !force) return;

  // 能量弹：快速连发；正常：较慢射速
  var inRapid = now < player.rapidFireUntil;
  var fireRate = inRapid ? CFG.RAPID_FIRE_RATE : CFG.FIRE_RATE;
  if (now - lastShot < fireRate) return;

  lastShot = now;
  player.ammo--;

  // 长按减速：每次射击降低子弹速度
  player.bulletSpeed = M.max(CFG.BULLET_SPEED_MIN, player.bulletSpeed - CFG.BULLET_SPEED_DECAY);
  var spd = player.bulletSpeed;

  // 自动瞄准最近的红色外星人或宇宙垃圾
  var aimAngle = player.heading;
  var bestDist = 9999;

  for (var i = 0; i < redAliens.length; i++) {
    var d = dist(player, redAliens[i].pos);
    if (d < bestDist) { bestDist = d; aimAngle = angleTo(player, redAliens[i].pos); }
  }

  for (var i = 0; i < spaceJunk.length; i++) {
    var d = dist(player, spaceJunk[i].pos);
    if (d < bestDist) { bestDist = d; aimAngle = angleTo(player, spaceJunk[i].pos); }
  }

  // 绿色外星人不会被锁定（不加入瞄准逻辑）

  bullets.push({
    pos: { x: player.x, y: player.y },
    vx: M.cos(aimAngle) * spd,
    vy: M.sin(aimAngle) * spd,
    life: 50
  });

  updateHUD();
}

// ============================================================
//  🔄 每帧更新
// ============================================================

function update(dt) {
  if (state === 'countdown') {
    // 小王子慢走：最后3秒种花
    var elapsed2 = Date.now() - princeTimer;
    var totalMS = CFG.COUNTDOWN_SEC * 1000;
    if (elapsed2 < totalMS - 3000) princePhase = 0;
    else if (elapsed2 < totalMS) princePhase = 1;
    else princePhase = 2;

    // 倒计时结束 → 下一关
    if (Date.now() - countdownStart > CFG.COUNTDOWN_SEC * 1000) {
      plantedFlowers.push(level);
      if (plantedFlowers.length >= 1) princessActive = true; // 测试，之后改回99
      // 65%概率+1，35%概率+2
      redCount += M.random() < 0.65 ? 1 : 2;
      level++;
      player.hp   = M.min(CFG.PLAYER_HP, player.hp + 30);
      player.ammo = M.min(CFG.PLAYER_AMMO, player.ammo + 30);
      player.invUntil = Date.now() + 5000;
      player.speed = CFG.PLAYER_SPEED;
      player.boostUntil = 0;
      player.bulletSpeed = CFG.BULLET_SPEED_MAX;
      player.rapidFireUntil = 0;
      armState = 'idle'; armLength = 0; armGrabbed = null; armSlow = 1;
      initLevel(level);
      state = 'play';
      updateHUD();
    }
  }
  if (state !== 'play' && state !== 'countdown') return;
  if (hintPause) {
    // 非抓取提示3秒后自动消失
    if (hintMsg && Date.now() - hintTimer > 3000) { hintPause = false; hintMsg = ''; }
    return;
  }
  var now = Date.now();
  gameTime += dt;
  if (shakeAmt > 0) shakeAmt = M.max(0, shakeAmt - dt / 200);

  // ── 玩家移动 ──
  if (joystick.active && (joystick.dx || joystick.dy)) {
    player.heading = M.atan2(joystick.dy, joystick.dx);
  }
  player.x += M.cos(player.heading) * player.speed * armSlow * (dt / 16);
  player.y += M.sin(player.heading) * player.speed * armSlow * (dt / 16);
  player.x = clamp(player.x, 25, CFG.WORLD_W - 25);
  player.y = clamp(player.y, 25, CFG.WORLD_H - 25);

  // ── 速度衰减 ──
  if (now > player.boostUntil) {
    if (player.speed > 3.5) player.speed = M.max(3.5, player.speed - 0.025 * (dt / 16));
    else                    player.speed = M.max(1.6, player.speed - 0.008 * (dt / 16));
  }

  // ── 机械臂 ──
  updateArm(dt);

  // ── 地球回血 ──
  if (nearEarth(player)) {
    var healAmt = CFG.HEAL_RATE * (dt / 1000);
    player.hp = M.min(CFG.PLAYER_HP, player.hp + healAmt);
    if (M.floor(gameTime / 500) % 2 === 0) {
      spawnParticles(player.x, player.y, '#6f0', 1);
    }
    updateHUD();
  }

  // ── 射击 ──
  if (mouseShoot) {
    playerFire(now, true);
  } else {
    // 松手后子弹速度逐渐恢复
    player.bulletSpeed = M.min(CFG.BULLET_SPEED_MAX, player.bulletSpeed + CFG.BULLET_SPEED_RECOVER * (dt / 16));
  }

  // ── 玩家碰撞检测 ──
  for (var i = 0; i < redAliens.length; i++) {
    if (!redAliens[i].dying && dist(player, redAliens[i].pos) < 32) { gameOver('撞到红色外星人'); return; }
  }
  for (var i = 0; i < greenAliens.length; i++) {
    if (dist(player, greenAliens[i].pos) < 32) { gameOver('撞到绿色外星人'); return; }
  }
  for (var i = 0; i < spaceJunk.length; i++) {
    if (dist(player, spaceJunk[i].pos) < spaceJunk[i].radius + 14) { gameOver('撞到太空垃圾'); return; }
  }
  for (var i = bombs.length - 1; i >= 0; i--) {
    if (dist(player, bombs[i].pos) < 40) {
      // 炸弹爆炸：范围红外星人变黑后消失
      var blastR = CFG.ARM_MAX_LEN + 50;
      for (var j = redAliens.length - 1; j >= 0; j--) {
        if (dist(player, redAliens[j].pos) < blastR) {
          redAliens[j].dying = 30; // 变黑倒计时
        }
      }
      spawnParticles(player.x, player.y, '#f80', 30);
      bombs.splice(i, 1);
      updateHUD();
      // 检查是否所有活着的红外星人都死了
      if (!redAliens.some(function(a){ return !a.dying; })) { levelWin(); return; }
    }
  }
  // ── 玩家子弹 ──
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    b.pos.x += b.vx * (dt / 16);
    b.pos.y += b.vy * (dt / 16);
    b.life--;

    if (b.pos.x < -60 || b.pos.x > CFG.WORLD_W + 60 ||
        b.pos.y < -60 || b.pos.y > CFG.WORLD_H + 60 || b.life <= 0) {
      bullets.splice(i, 1);
      continue;
    }

    var hit = false;

    // 击中红色外星人
    for (var j = redAliens.length - 1; j >= 0 && !hit; j--) {
      var a = redAliens[j];
      if (dist(b.pos, a.pos) < 38) {
        a.hp -= CFG.PLAYER_DMG;
        spawnParticles(b.pos.x, b.pos.y, '#f64', 8);
        hit = true;
        if (a.hp <= 0) {
          spawnParticles(a.pos.x, a.pos.y, '#f84', 25);
          redAliens.splice(j, 1);
          updateHUD();
          if (!redAliens.some(function(a){ return !a.dying; })) { levelWin(); return; }
        }
      }
    }

    // 绿色外星人免疫子弹 —— 子弹直接穿过，无任何效果

    // 击中宇宙垃圾
    if (!hit) {
      for (var j = spaceJunk.length - 1; j >= 0; j--) {
        var jk = spaceJunk[j];
        if (dist(b.pos, jk.pos) < jk.radius + 10) {
          spawnParticles(jk.pos.x, jk.pos.y, '#aac', 10);
          spaceJunk.splice(j, 1);
          hit = true;
          break;
        }
      }
    }

    if (hit) bullets.splice(i, 1);
  }

  // ── 敌方子弹 ──
  for (var i = enemyBullets.length - 1; i >= 0; i--) {
    var eb = enemyBullets[i];
    eb.pos.x += eb.vx * (dt / 16);
    eb.pos.y += eb.vy * (dt / 16);
    eb.life--;

    if (eb.pos.x < -60 || eb.pos.x > CFG.WORLD_W + 60 ||
        eb.pos.y < -60 || eb.pos.y > CFG.WORLD_H + 60 || eb.life <= 0) {
      enemyBullets.splice(i, 1);
      continue;
    }

    if (now > player.invUntil && dist(eb.pos, player) < 30) {
      player.hp -= CFG.RED_BULLET_DMG;
      player.invUntil = now + CFG.PLAYER_INVINCIBLE_MS;
      spawnParticles(player.x, player.y, '#f33', 10);
      enemyBullets.splice(i, 1);
      updateHUD();
      if (player.hp <= 0) { gameOver('火箭被击毁'); return; }
    }
  }

  // ── 红色外星人 AI（游走 / 追击 / 攻击）──
  for (var i = redAliens.length - 1; i >= 0; i--) {
    var r = redAliens[i];
    // 炸弹死亡动画
    if (r.dying) {
      r.dying--;
      if (r.dying <= 0) { spawnParticles(r.pos.x, r.pos.y, '#000', 10); redAliens.splice(i, 1); }
      continue;
    }
    var spd = r.speed;

    // 进入范围 → 切换追击模式
    if (!r.hunting && dist(r.pos, player) < CFG.RED_AGGRO_RANGE) {
      r.hunting = true;
    }

    // 远离地球（追击和游走都适用）
    if (dist(r.pos, EARTH) < EARTH.r + 40) {
      var ea = angleTo(EARTH, r.pos);
      r.pos.x += M.cos(ea) * 1.5 * (dt / 16);
      r.pos.y += M.sin(ea) * 1.5 * (dt / 16);
    } else if (r.hunting) {
      // 追击模式：追玩家 + 开火
      var ag = angleTo(r.pos, player);
      r.pos.x += M.cos(ag) * spd * (dt / 16);
      r.pos.y += M.sin(ag) * spd * (dt / 16);
      if (now - r.lastShot >= r.cooldown) {
        r.lastShot = now;
        var bang = angleTo(r.pos, player);
        enemyBullets.push({
          pos: { x: r.pos.x, y: r.pos.y },
          vx: M.cos(bang) * CFG.RED_BULLET_SPEED,
          vy: M.sin(bang) * CFG.RED_BULLET_SPEED,
          life: 110
        });
      }
    } else {
      // 游走模式：随机漫步
      if (now > r.wanderTimer) {
        r.wanderAngle = rand(0, M.PI * 2);
        r.wanderTimer = now + rand(1000, 3000);
      }
      r.pos.x += M.cos(r.wanderAngle) * spd * 0.6 * (dt / 16);
      r.pos.y += M.sin(r.wanderAngle) * spd * 0.6 * (dt / 16);
    }

    r.pos.x = clamp(r.pos.x, 35, CFG.WORLD_W - 35);
    r.pos.y = clamp(r.pos.y, 35, CFG.WORLD_H - 35);
  }

  // ── 绿色外星人 AI ──
  for (var i = 0; i < greenAliens.length; i++) {
    var g = greenAliens[i];
    var gsp = g.speed;

    if (dist(g.pos, EARTH) < EARTH.r + 40) {
      var ea = angleTo(EARTH, g.pos);
      g.pos.x += M.cos(ea) * 1.5 * (dt / 16);
      g.pos.y += M.sin(ea) * 1.5 * (dt / 16);
    } else {
      if (now > g.wanderTimer) {
        g.wanderAngle = rand(0, M.PI * 2);
        g.wanderTimer = now + rand(1000, 3500);
      }
      g.pos.x += M.cos(g.wanderAngle) * gsp * (dt / 16);
      g.pos.y += M.sin(g.wanderAngle) * gsp * (dt / 16);
    }

    g.pos.x = clamp(g.pos.x, 35, CFG.WORLD_W - 35);
    g.pos.y = clamp(g.pos.y, 35, CFG.WORLD_H - 35);

    // 绿色外星人投掷能量包或闪电
    if (dist(g.pos, player) < 160 && M.random() < 0.008 * (dt / 16)) {
      pickups.push({
        pos: { x: g.pos.x, y: g.pos.y },
        type: M.random() < 0.5 ? 'ammo' : 'boost',
        life: 700,
        vy: -0.5
      });
      var ep = spawnAtEdge();
      g.pos.x = ep.x;
      g.pos.y = ep.y;
    }
  }

  // ── 能量包+闪电（每关配额制）──
  var ammoQuota = 2 + level;   // 第1关=3, 第2关=4...
  var boostQuota = 2 + level;
  if (now > nextPickupTimer && (ammoSpawned < ammoQuota || boostSpawned < boostQuota)) {
    // 交替生成或随机补缺
    var spawnAmmo = ammoSpawned < ammoQuota && (ammoSpawned <= boostSpawned || boostSpawned >= boostQuota);
    pickups.push({
      pos: { x: rand(80, CFG.WORLD_W - 80), y: rand(80, CFG.WORLD_H - 80) },
      type: spawnAmmo ? 'ammo' : 'boost',
      life: 650,
      vy: -0.3
    });
    if (spawnAmmo) ammoSpawned++; else boostSpawned++;
    nextPickupTimer = now + rand(2000, 4000);
  }

  // ── 拾取能量包 ──
  for (var i = pickups.length - 1; i >= 0; i--) {
    var pk = pickups[i];
    pk.pos.y += pk.vy * (dt / 16);
    pk.life--;

    if (dist(pk.pos, player) < 28) {
      if (pk.type === 'ammo') {
        player.ammo = M.min(CFG.PLAYER_AMMO, player.ammo + 20);
        player.rapidFireUntil = now + CFG.RAPID_FIRE_DURATION;
        player.bulletSpeed = CFG.BULLET_SPEED_MAX;
        if (ammoHint) { ammoHint = false; hintPause = true; hintMsg = '补充弹药，加速射击'; hintTimer = Date.now(); }
      } else {
        player.speed = CFG.BOOST_SPEED;
        player.boostUntil = now + CFG.BOOST_DURATION;
        if (boostHint) { boostHint = false; hintPause = true; hintMsg = '⚡ 加速'; hintTimer = Date.now(); }
      }
      pickups.splice(i, 1);
      updateHUD();
      continue;
    }
    if (pk.life <= 0 || pk.pos.y > CFG.WORLD_H + 60) {
      pickups.splice(i, 1);
    }
  }

  // ── 宇宙垃圾移动 ──
  for (var i = 0; i < spaceJunk.length; i++) {
    var j = spaceJunk[i];
    j.pos.x += M.cos(j.driftAngle) * j.driftSpeed * (dt / 16);
    j.pos.y += M.sin(j.driftAngle) * j.driftSpeed * (dt / 16);
    if (j.pos.x < 15 || j.pos.x > CFG.WORLD_W - 15) j.driftAngle = M.PI - j.driftAngle;
    if (j.pos.y < 15 || j.pos.y > CFG.WORLD_H - 15) j.driftAngle = -j.driftAngle;
    j.pos.x = clamp(j.pos.x, 15, CFG.WORLD_W - 15);
    j.pos.y = clamp(j.pos.y, 15, CFG.WORLD_H - 15);
    j.rotation += j.rotSpeed * (dt / 16);
  }

  // ── 小星星刷新（每关配额制，第1关20颗，之后每关+5）──
  var starQuota = CFG.STAR_BASE + (level - 1) * CFG.STAR_SCALE;
  if (now > nextStoneTimer && stars.length < starQuota) {
    spawnStar();
    if (stars.length < starQuota) spawnStar();
    // 第一次出现星星→暂停教学
    if (armHint && stars.length > 0) { hintPause = true; hintTimer = Date.now(); }
    nextStoneTimer = now + rand(CFG.STAR_SPAWN_MIN, CFG.STAR_SPAWN_MAX);
  }

  // ── 星星移动 & 拾取（不同等级不同轨迹）──
  for (var i = stars.length - 1; i >= 0; i--) {
    var st = stars[i];
    st.life--;
    st.phase += dt * 0.003;

    // 根据等级应用不同运动模式
    if (st.tier === 0) {
      // 等级1: 缓慢随机漂浮
      st.vx = st.baseVX + M.sin(st.phase * 0.7) * 0.3;
      st.vy = st.baseVY + M.cos(st.phase * 0.5) * 0.3;
    } else if (st.tier === 1) {
      // 等级2: 波浪前行
      st.vx = st.baseVX + M.sin(st.phase * 1.5) * 0.5;
      st.vy = st.baseVY;
    } else {
      // 等级4(500分): S形曲线+更快
      st.vx = st.baseVX + M.sin(st.phase * 2.0) * 0.6;
      st.vy = st.baseVY + M.cos(st.phase * 1.5) * 0.5;
    }

    st.pos.x += st.vx * (dt / 16);
    st.pos.y += st.vy * (dt / 16);

    // 超出世界边界反弹
    if (st.pos.x < 20) { st.pos.x = 20; st.baseVX = M.abs(st.baseVX); }
    if (st.pos.x > CFG.WORLD_W - 20) { st.pos.x = CFG.WORLD_W - 20; st.baseVX = -M.abs(st.baseVX); }
    if (st.pos.y < 20) { st.pos.y = 20; st.baseVY = M.abs(st.baseVY); }
    if (st.pos.y > CFG.WORLD_H - 20) { st.pos.y = CFG.WORLD_H - 20; st.baseVY = -M.abs(st.baseVY); }

    if (st.life <= 0) { stars.splice(i, 1); continue; }

    // 碰到火箭
    if (dist(st.pos, player) < 28) {
      var pts2 = CFG.STAR_SCORES[st.tier];
      score += pts2;
      floatingTxt.push({ x: st.pos.x, y: st.pos.y, text: '+' + pts2, life: 60, vy: -2 });
      spawnParticles(st.pos.x, st.pos.y, '#ff0', 8);
      stars.splice(i, 1);
      updateHUD();
    }
  }

  // ── 浮动文字衰减 ──
  for (var i = floatingTxt.length - 1; i >= 0; i--) {
    var ft = floatingTxt[i];
    ft.y += ft.vy * (dt / 16);
    ft.life--;
    if (ft.life <= 0) floatingTxt.splice(i, 1);
  }

  // ── 粒子衰减 ──
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * (dt / 16);
    p.y += p.vy * (dt / 16);
    p.life -= p.decay * (dt / 16);
    if (p.life <= 0) particles.splice(i, 1);
  }

  // ── 相机跟随 ──
  camera.x = clamp(player.x - screenW / 2, 0, CFG.WORLD_W - screenW);
  camera.y = clamp(player.y - screenH / 2, 0, CFG.WORLD_H - screenH);

  // ── 补充绿色外星人 ──
  var targetGreen = M.max(1, M.floor(level / 3));
  if (greenAliens.length < targetGreen && M.random() < 0.004 * (dt / 16)) {
    var ep = spawnAtEdge();
    var cfg = levelConfig(level);
    greenAliens.push({
      pos: { x: ep.x, y: ep.y },
      wanderAngle: ep.inAngle,
      wanderTimer: Date.now() + rand(1000, 3500),
      energyAmt: M.random() < 0.5 ? 20 : 50,
      speed: cfg.redSpeed * 0.8
    });
  }

  // ── 数值钳制 ──
  player.hp   = clamp(player.hp,   0, CFG.PLAYER_HP);
  player.ammo = clamp(player.ammo, 0, CFG.PLAYER_AMMO);
  player.speed = clamp(player.speed, 1.6, CFG.BOOST_SPEED);
}

// ============================================================
//  🎨 渲染
// ============================================================

function worldToScreen(wx, wy, shakeX, shakeY) {
  return {
    x: wx - camera.x + shakeX,
    y: wy - camera.y + shakeY
  };
}

function render() {
  ctx.clearRect(0, 0, screenW, screenH);
  var now = Date.now();
  var t = gameTime;

  var sx = 0, sy = 0;
  if (shakeAmt > 0) {
    sx = (M.random() - 0.5) * shakeAmt * 12;
    sy = (M.random() - 0.5) * shakeAmt * 12;
  }

  var w2s = function(wx, wy) { return worldToScreen(wx, wy, sx, sy); };

  // ── 背景地图 ──
  if (images.m) {
    ctx.drawImage(images.m, -camera.x, -camera.y, CFG.WORLD_W, CFG.WORLD_H);
  } else {
    ctx.fillStyle = '#0a0030';
    ctx.fillRect(0, 0, screenW, screenH);
  }

  // ── 地球光环 ──
  var es = w2s(EARTH.x, EARTH.y);
  var g = ctx.createRadialGradient(es.x, es.y, EARTH.r * 0.3, es.x, es.y, EARTH.r * 1.5);
  g.addColorStop(0, 'rgba(100,220,255,0.15)');
  g.addColorStop(1, 'rgba(0,100,200,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(es.x, es.y, EARTH.r * 1.5, 0, M.PI * 2);
  ctx.fill();

  // ── 行星 ──
  for (var i = 0; i < PLANETS.length; i++) {
    if (i === 3) continue; // 小王子星球不画虚线
    var ps = w2s(PLANETS[i].x, PLANETS[i].y);
    ctx.strokeStyle = 'rgba(255,120,60,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 10]);
    ctx.beginPath();
    ctx.arc(ps.x, ps.y, PLANETS[i].r, 0, M.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── 永久种植的小花 + 小王子（右下角黄色大星球弧面）──
  var flowerPlanet = PLANETS[3];
  var fp = w2s(flowerPlanet.x, flowerPlanet.y);
  var pr2 = flowerPlanet.r;
  var ARC_RIGHT = 10 * M.PI / 180;   // 星球右侧
  var ARC_BOTTOM = 55 * M.PI / 180;  // 星球右下弧面
  var ARC_STEP  = 14 * M.PI / 180;

  if (images.flower) {
    for (var fi = 0; fi < plantedFlowers.length; fi++) {
      var fa = ARC_RIGHT + fi * ARC_STEP;
      var ffx = fp.x + M.sin(fa) * pr2;
      var ffy = fp.y - M.cos(fa) * pr2;
      ctx.save(); ctx.translate(ffx, ffy); ctx.rotate(fa);
      ctx.drawImage(images.flower, -10, -14, 20, 22);
      ctx.restore();
    }
  }

  if (state === 'countdown') {
    var el = Date.now() - princeTimer;
    var nextAngle = ARC_RIGHT + plantedFlowers.length * ARC_STEP;
    var fwx = fp.x + M.sin(nextAngle) * pr2;
    var fwy = fp.y - M.cos(nextAngle) * pr2;
    var walkDuration = CFG.COUNTDOWN_SEC * 1000 - 3000;
    var walkProgress = princePhase === 0 ? M.min(1, el / walkDuration) : 1;
    walkProgress = 1 - M.pow(1 - walkProgress, 3);
    // 王子从右侧直线慢走到花的位置
    var prX = (fwx + 55) + (fwx - (fwx + 55)) * walkProgress;
    var prY = (fwy - 15) + (fwy - (fwy - 15)) * walkProgress;

    if (princePhase >= 1 && images.flower) {
      var plantStart = CFG.COUNTDOWN_SEC * 1000 - 3000;
      var fa2 = M.min(1, (el - plantStart) / 2000);
      ctx.globalAlpha = fa2;
      ctx.save(); ctx.translate(fwx, fwy); ctx.rotate(nextAngle);
      ctx.drawImage(images.flower, -10, -14, 20, 22);
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    if (princePhase <= 1 && images.prince) {
      var fadeStart = CFG.COUNTDOWN_SEC * 1000 - 1000;
      var pa = el < fadeStart ? 1 : M.max(0, 1 - (el - fadeStart) / 1000);
      ctx.globalAlpha = pa;
      ctx.save(); ctx.translate(prX, prY);
      ctx.drawImage(images.prince, -22, -55, 44, 55);
      ctx.restore();
      // 公主：首次王子到位后1.5x速赶来，之后一起出发
      // 公主走在王子右侧
      if (plantedFlowers.length >= 0 && images.princess) { // TODO: 改回98
        var pssX, pssY;
        if (plantedFlowers.length === 0) {
          var pssProgress = M.min(1, M.max(0, walkProgress - 0.7) / 0.3 * 1.5);
          pssX = (fwx + 85) + (prX + 20 - (fwx + 85)) * pssProgress;
          pssY = (fwy - 15) + (prY - (fwy - 15)) * pssProgress;
        } else {
          pssX = (fwx + 85) + (prX + 20 - (fwx + 85)) * walkProgress;
          pssY = (fwy - 15) + (prY - (fwy - 15)) * walkProgress;
        }
        ctx.save(); ctx.translate(pssX, pssY);
        ctx.drawImage(images.princess, -20, -50, 40, 55);
        ctx.restore();
      }
    }
  }

  // ── 宇宙垃圾 ──
  for (var i = 0; i < spaceJunk.length; i++) {
    var jk = spaceJunk[i];
    var js = w2s(jk.pos.x, jk.pos.y);
    ctx.save();
    ctx.translate(js.x, js.y);
    ctx.rotate(jk.rotation);
    ctx.fillStyle = '#111';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-jk.radius, 0);
    ctx.lineTo(-jk.radius * 0.3, -jk.radius * 0.6);
    ctx.lineTo( jk.radius * 0.5, -jk.radius * 0.3);
    ctx.lineTo( jk.radius,        jk.radius * 0.2);
    ctx.lineTo( jk.radius * 0.4,  jk.radius * 0.5);
    ctx.lineTo(-jk.radius * 0.5,  jk.radius * 0.7);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  // ── 炸弹 ──
  for (var i = 0; i < bombs.length; i++) {
    var bm = bombs[i];
    var bms = w2s(bm.pos.x, bm.pos.y);
    var pulse2 = M.sin(bm.phase + gameTime * 0.05) * 0.3 + 0.7;
    // 红色脉冲光环
    var bg = ctx.createRadialGradient(bms.x, bms.y, 8, bms.x, bms.y, 28);
    bg.addColorStop(0, 'rgba(255,60,20,' + (0.5 * pulse2) + ')');
    bg.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(bms.x, bms.y, 28, 0, M.PI*2); ctx.fill();
    // 炸弹本体
    if (images.bomb) {
      ctx.drawImage(images.bomb, bms.x - 35, bms.y - 32, 70, 64);
    } else {
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(bms.x, bms.y, 18, 0, M.PI*2); ctx.fill();
      ctx.fillStyle = '#f00';
      ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('💣', bms.x, bms.y + 5);
    }
  }

  // ── 小星星 ──
  for (var i = 0; i < stars.length; i++) {
    var st = stars[i];
    var sts = w2s(st.pos.x, st.pos.y);
    var key2 = 'star' + st.tier;
    if (images[key2]) {
      ctx.drawImage(images[key2], sts.x - 20, sts.y - 20, 40, 40);
    } else {
      var sc = ['#ff0', '#fa0', '#f0f'];
      ctx.fillStyle = sc[st.tier];
      ctx.beginPath();
      ctx.arc(sts.x, sts.y, 14, 0, M.PI * 2);
      ctx.fill();
    }
  }

  // ── 能量包 ──
  for (var i = 0; i < pickups.length; i++) {
    var pk = pickups[i];
    var ps = w2s(pk.pos.x, pk.pos.y);
    var bob = M.sin(pk.life * 0.1) * 6;
    var py = ps.y + bob;
    if (pk.type === 'boost') {
      // 闪电 — 金黄色发光
      var glow = ctx.createRadialGradient(ps.x, py, 4, ps.x, py, 24);
      glow.addColorStop(0, 'rgba(255,220,50,0.8)');
      glow.addColorStop(1, 'rgba(255,150,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(ps.x, py, 24, 0, M.PI*2); ctx.fill();
      if (images.bolt) {
        ctx.drawImage(images.bolt, ps.x - 20, py - 20, 40, 40);
      } else {
        ctx.fillStyle = '#fd0';
        ctx.beginPath(); ctx.arc(ps.x, py, 16, 0, M.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('⚡', ps.x, py + 6);
      }
    } else {
      // 能量包 — 绿色发光
      var glow2 = ctx.createRadialGradient(ps.x, py, 4, ps.x, py, 24);
      glow2.addColorStop(0, 'rgba(50,255,100,0.7)');
      glow2.addColorStop(1, 'rgba(0,200,50,0)');
      ctx.fillStyle = glow2;
      ctx.beginPath(); ctx.arc(ps.x, py, 24, 0, M.PI*2); ctx.fill();
      if (images.pack) {
        ctx.drawImage(images.pack, ps.x - 22, py - 22, 44, 44);
      } else {
        ctx.fillStyle = '#4f8';
        ctx.beginPath(); ctx.arc(ps.x, py, 14, 0, M.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('🔫', ps.x, py + 5);
      }
    }
  }

  // ── 玩家子弹 ──
  for (var i = 0; i < bullets.length; i++) {
    var bs = w2s(bullets[i].pos.x, bullets[i].pos.y);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(bs.x, bs.y, 5, 0, M.PI * 2);
    ctx.fill();
  }

  // ── 敌方子弹 ──
  for (var i = 0; i < enemyBullets.length; i++) {
    var bs = w2s(enemyBullets[i].pos.x, enemyBullets[i].pos.y);
    ctx.fillStyle = '#f44';
    ctx.beginPath();
    ctx.arc(bs.x, bs.y, 4, 0, M.PI * 2);
    ctx.fill();
  }

  // ── 红色外星人 ──
  for (var i = 0; i < redAliens.length; i++) {
    var r = redAliens[i];
    var rs = w2s(r.pos.x, r.pos.y);
    if (r.dying) {
      // 炸弹触发后变黑闪烁
      ctx.globalAlpha = r.dying % 6 < 3 ? 0.3 : 0.8;
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(rs.x, rs.y, 18, 0, M.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (images.r) {
      ctx.save();
      ctx.translate(rs.x, rs.y);
      ctx.rotate(angleTo(r.pos, player) + M.PI / 2);
      ctx.drawImage(images.r, -40, -22, 80, 44);
      ctx.restore();
    } else {
      ctx.fillStyle = '#f33';
      ctx.beginPath();
      ctx.arc(rs.x, rs.y, 18, 0, M.PI * 2);
      ctx.fill();
    }
    // HP 条（红色）
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(rs.x - 14, rs.y - 26, 28, 4);
    ctx.fillStyle = '#f33';
    ctx.fillRect(rs.x - 14, rs.y - 26, 28 * (r.hp / r.maxHp), 4);
  }

  // ── 绿色外星人 ──
  for (var i = 0; i < greenAliens.length; i++) {
    var gr = greenAliens[i];
    var gs = w2s(gr.pos.x, gr.pos.y);
    if (images.g) {
      ctx.save();
      ctx.translate(gs.x, gs.y);
      ctx.rotate(gr.wanderAngle + M.PI / 2);
      ctx.drawImage(images.g, -40, -22, 80, 44);
      ctx.restore();
    } else {
      ctx.fillStyle = '#4f4';
      ctx.beginPath();
      ctx.arc(gs.x, gs.y, 18, 0, M.PI * 2);
      ctx.fill();
    }
    // 友好标记
    ctx.strokeStyle = 'rgba(80,255,130,0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(gs.x, gs.y, 26, 0, M.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── 玩家火箭 ──
  if (player) {
    var ps = w2s(player.x, player.y);

    if (images.p) {
      ctx.save();
      ctx.translate(ps.x, ps.y);
      ctx.rotate(player.heading + M.PI / 2);

      // 尾焰
      var fl = M.abs(M.sin(t / 60)) * 0.5 + 0.5;
      ctx.fillStyle = 'rgba(255,136,0,0.8)';
      ctx.beginPath();
      ctx.moveTo(-8, 35);
      ctx.lineTo(0, 35 + 28 * fl);
      ctx.lineTo(8, 35);
      ctx.closePath();
      ctx.fill();

      ctx.drawImage(images.p, -50, -50, 100, 100);
      ctx.restore();
    }

    // 无敌护盾
    if (now < player.invUntil) {
      ctx.strokeStyle = 'rgba(100,200,255,' + (0.4 + M.sin(now / 30) * 0.3) + ')';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(ps.x, ps.y, 36, 0, M.PI * 2);
      ctx.stroke();
    }

    // 玩家 HP 条
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(ps.x - 18, ps.y - 36, 36, 5);
    ctx.fillStyle = player.hp > 50 ? '#4f4' : player.hp > 25 ? '#fa3' : '#f33';
    ctx.fillRect(ps.x - 18, ps.y - 36, 36 * (player.hp / 100), 5);
  }

  // ── 机械臂 ──
  if (armState !== 'idle' && player) {
    var ps2 = w2s(player.x, player.y);
    // 从火箭顶端（整流罩）沿轴线伸出
    var noseX = ps2.x + M.cos(armAngle) * 50;
    var noseY = ps2.y + M.sin(armAngle) * 50;
    var tipX = noseX + M.cos(armAngle) * armLength;
    var tipY = noseY + M.sin(armAngle) * armLength;

    // 绳索 — 黑色粗线
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 4;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(noseX, noseY);
    ctx.lineTo(tipX, tipY);
    ctx.stroke();

    // 抓夹 — 黑色
    var clawOpen = armState === 'extending' ? 0.6 : 0.2;
    var cs = CFG.ARM_CLAW_SIZE;
    ctx.fillStyle = '#333';
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 2;
    // 左爪
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX + M.cos(armAngle - 1.2) * cs * clawOpen, tipY + M.sin(armAngle - 1.2) * cs * clawOpen);
    ctx.lineTo(tipX + M.cos(armAngle) * cs * 0.5, tipY + M.sin(armAngle) * cs * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // 右爪
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX + M.cos(armAngle + 1.2) * cs * clawOpen, tipY + M.sin(armAngle + 1.2) * cs * clawOpen);
    ctx.lineTo(tipX + M.cos(armAngle) * cs * 0.5, tipY + M.sin(armAngle) * cs * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // 抓到星星时拖拽显示
    if (armGrabbed !== null && stars.indexOf(armGrabbed) >= 0) {
      armGrabbed.pos.x = player.x + M.cos(armAngle) * (armLength + 50);
      armGrabbed.pos.y = player.y + M.sin(armAngle) * (armLength + 50);
    }
  }

  // ── 粒子 ──
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var ps3 = w2s(p.x, p.y);
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(ps3.x, ps3.y, p.size * p.life, 0, M.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── 浮动文字 ──
  for (var i = 0; i < floatingTxt.length; i++) {
    var ft = floatingTxt[i];
    var fts = w2s(ft.x, ft.y);
    var alpha = M.min(1, ft.life / 30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, fts.x, fts.y);
  }
  ctx.globalAlpha = 1;

  // ── 抓取教学暂停 ──
  if (hintPause) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, screenW, screenH);
    // 箭头从屏幕中央指向按钮
    var btnRect = document.getElementById('armBtn').getBoundingClientRect();
    var tx = btnRect.left + btnRect.width / 2;
    var ty = btnRect.top + btnRect.height / 2;
    var fx = screenW / 2, fy = screenH / 2;
    var pulse = M.sin(Date.now() / 300) * 0.4 + 0.6;
    ctx.strokeStyle = 'rgba(255,220,50,' + pulse + ')';
    ctx.lineWidth = 4;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(tx - 30, ty + 5);
    ctx.stroke();
    ctx.setLineDash([]);
    // 箭头尖
    ctx.fillStyle = 'rgba(255,220,50,' + pulse + ')';
    ctx.beginPath();
    ctx.moveTo(tx - 20, ty - 10);
    ctx.lineTo(tx + 2, ty + 5);
    ctx.lineTo(tx - 20, ty + 20);
    ctx.closePath();
    ctx.fill();
    // 按钮光圈
    ctx.strokeStyle = 'rgba(255,200,50,' + pulse + ')';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(tx, ty, 42, 0, M.PI * 2);
    ctx.stroke();
    // 文字
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(hintMsg || '👆 按键抓取', tx, ty - 55);
    ctx.fillStyle = '#fff';
    ctx.font = '14px sans-serif';
    ctx.fillText('点击右侧按钮', screenW / 2, screenH * 0.65);
  }

  // ── 倒计时覆盖 ──
  if (state === 'countdown') {
    var remain = M.max(0, M.ceil((CFG.COUNTDOWN_SEC * 1000 - (Date.now() - countdownStart)) / 1000));
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, screenW, screenH);
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(remain, screenW / 2, screenH / 2);
    ctx.font = 'bold 18px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('通关！继续拾取星星', screenW / 2, screenH / 2 + 40);
  }

  // ── 虚拟摇杆 ──
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.arc(joystick.cx, joystick.cy, joystick.r, 0, M.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  if (joystick.active && (joystick.dx || joystick.dy)) {
    var ja = M.atan2(joystick.dy, joystick.dx);
    var jl = M.min(joystick.r, M.hypot(joystick.dx, joystick.dy) * 0.8);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 3;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(joystick.cx, joystick.cy);
    ctx.lineTo(joystick.cx + M.cos(ja) * jl, joystick.cy + M.sin(ja) * jl);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(joystick.cx + joystick.dx * 0.6, joystick.cy + joystick.dy * 0.6, 14, 0, M.PI * 2);
    ctx.fill();
  }
}

// ============================================================
//  🔁 游戏循环
// ============================================================

function gameLoop(ts) {
  if (!lastFrame) lastFrame = ts || 0;
  var dt = ts ? ts - lastFrame : 0;
  lastFrame = ts || lastFrame;
  if (dt > 120) dt = 120;
  if (dt < 0) dt = 0;

  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ============================================================
//  🚀 启动
// ============================================================

canvas = document.getElementById('c');
ctx = canvas.getContext('2d');

function resize() {
  screenW = window.innerWidth;
  screenH = window.innerHeight;
  canvas.width  = screenW;
  canvas.height = screenH;
  joystick.cy = screenH - 140;
}
resize();
window.addEventListener('resize', resize);

// ── 加载图片 ──
var imgList = { p: '主角.png', m: '大地图.jpg', r: '红色外星人.png', g: '绿色外星人.png', prince: '小王子.png', princess: 'princess.png', flower: '小花.png', bolt: '闪电.png', pack: '能量包.png', bomb: '炸弹.png', star0: '等级1小星星.png', star1: '等级2小星星.png', star2: '等级4小星星.png' };
var imgKeys = Object.keys(imgList);
var imgLoaded = 0;

for (var k in imgList) {
  (function(key) {
    var img = new Image();
    images[key] = null;
    img.onload = function() {
      images[key] = img;
      imgLoaded++;
      if (imgLoaded >= imgKeys.length) { lastFrame = Date.now(); gameLoop(); }
    };
    img.onerror = function() {
      imgLoaded++;
      if (imgLoaded >= imgKeys.length) { lastFrame = Date.now(); gameLoop(); }
    };
    img.src = imgList[key];
  })(k);
}

// ── 开始按钮 ──
var startBtn = document.getElementById('startBtn');
startBtn.addEventListener('click', function(e) {
  e.preventDefault(); e.stopPropagation(); startGame();
});
startBtn.addEventListener('touchend', function(e) {
  e.preventDefault(); e.stopPropagation(); startGame();
});
startBtn.addEventListener('touchstart', function(e) {
  e.preventDefault(); e.stopPropagation();
});

// ── 机械臂按钮 ──
var armBtn = document.getElementById('armBtn');
armBtn.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); armBtnBlock = true; deployArm(); });
armBtn.addEventListener('touchend', function(e) { armBtnBlock = false; });
armBtn.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); armBtnBlock = true; deployArm(); });
armBtn.addEventListener('mouseup', function(e) { armBtnBlock = false; });
// 初始隐藏，游戏开始后显示
armBtn.style.display = 'none';

// 防止白边
try { document.body.scrollIntoView(); } catch(e) {}

// ── 触摸控制（摇杆 + 射击）──
// 注意：事件绑定在 canvas 上，不会拦截 overlay 按钮

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (hintPause) return;
  if (state !== 'play' && state !== 'countdown') return;
  for (var i = 0; i < e.touches.length; i++) {
    var t = e.touches[i];
    if (armBtnBlock) { mouseShoot = false; return; }
    if (t.clientX < screenW * 0.45 && t.clientY > screenH * 0.4) {
      joystick.active = true;
      joystick.dx = t.clientX - joystick.cx;
      joystick.dy = t.clientY - joystick.cy;
    } else {
      mouseShoot = true;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (armBtnBlock) { mouseShoot = false; return; }
  if (state !== 'play' && state !== 'countdown') return;
  var hasL = false, hasR = false;
  for (var i = 0; i < e.touches.length; i++) {
    var t = e.touches[i];
    if (t.clientX < screenW * 0.45 && t.clientY > screenH * 0.4) {
      hasL = true;
      joystick.dx = t.clientX - joystick.cx;
      joystick.dy = t.clientY - joystick.cy;
    } else {
      hasR = true;
    }
  }
  if (!hasL) joystick.active = false;
  mouseShoot = hasR;
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  var hasL = false, hasR = false;
  for (var i = 0; i < e.touches.length; i++) {
    if (e.touches[i].clientX < screenW * 0.45 && e.touches[i].clientY > screenH * 0.4) hasL = true;
    else hasR = true;
  }
  if (!hasL) joystick.active = false;
  mouseShoot = hasR;
});

// ── 桌面鼠标 ──
canvas.addEventListener('mousemove', function(e) {
  if ((state === 'play' || state === 'countdown') && e.clientX < screenW * 0.45) {
    joystick.active = true;
    joystick.dx = e.clientX - joystick.cx;
    joystick.dy = e.clientY - joystick.cy;
  }
});
canvas.addEventListener('mousedown', function(e) {
  if (armBtnBlock) return;
  if ((state === 'play' || state === 'countdown') && e.clientX >= screenW * 0.45) mouseShoot = true;
});
canvas.addEventListener('mouseup', function() {
  mouseShoot = false;
  joystick.active = false;
});
</script>
